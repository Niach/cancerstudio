name: Real-Data Ingestion Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  real-data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MUTAVAX_APP_DATA_DIR: ${{ github.workspace }}/.run/app-data
      CORS_ALLOW_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      REAL_DATA_API_BASE: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm ci

      - name: Create Python virtualenv
        run: python -m venv .venv

      - name: Install backend dependencies
        run: ./.venv/bin/pip install -r backend/requirements.txt

      - name: Install bioinformatics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y samtools pigz

      - name: Fetch smoke sample data
        run: npm run sample-data:smoke

      - name: Fetch alignment-container sample data
        run: npm run sample-data:alignment

      - name: Reset local app data
        run: |
          mkdir -p .run
          rm -rf .run/app-data

      - name: Start backend
        run: |
          mkdir -p .run
          ./.venv/bin/uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 > .run/backend.log 2>&1 &
          echo $! > .run/backend.pid

      - name: Wait for backend
        run: python3 scripts/wait_for_http.py http://127.0.0.1:8000/health --timeout 60

      - name: Run real-data backend integration
        run: npm run test:backend:real-data

      - name: Stop backend before browser reset
        if: always()
        run: |
          if [ -f .run/backend.pid ]; then
            kill "$(cat .run/backend.pid)" || true
            rm .run/backend.pid
          fi

      - name: Reset local app data for browser smoke
        if: always()
        run: rm -rf .run/app-data

      - name: Restart backend for browser smoke
        run: |
          mkdir -p .run
          ./.venv/bin/uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 > .run/backend-browser.log 2>&1 &
          echo $! > .run/backend-browser.pid

      - name: Wait for backend after reset
        run: python3 scripts/wait_for_http.py http://127.0.0.1:8000/health --timeout 60

      - name: Start frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
          INTERNAL_API_URL: http://127.0.0.1:8000
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > .run/frontend.log 2>&1 &
          echo $! > .run/frontend.pid

      - name: Wait for frontend
        run: python3 scripts/wait_for_http.py http://127.0.0.1:3000 --timeout 120

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke
        run: npm run test:browser:real-data

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: real-data-ingestion-debug
          path: |
            .run
            playwright-report
            test-results

      - name: Cleanup
        if: always()
        run: |
          if [ -f .run/frontend.pid ]; then
            kill "$(cat .run/frontend.pid)" || true
          fi
          if [ -f .run/backend-browser.pid ]; then
            kill "$(cat .run/backend-browser.pid)" || true
          fi
          if [ -f .run/backend.pid ]; then
            kill "$(cat .run/backend.pid)" || true
          fi
